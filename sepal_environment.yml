name: active_fires_explorer
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - sepal-ui>=2.22.1,<3
  - numpy
  - pandas
  - requests
  - pytz
  - pyproj
  - shapely
  - geopandas
  - gdal=3.8.3
  - rasterio<=1.4.3
  - pip
  - pip:
      - git+https://github.com/openforis/earthengine-api.git@v1.1.5rc0#egg=earthengine-api&subdirectory=python
      - shapely-geojson
